version: "3.9"

services:
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    env_file:
      - ./.env
    networks:
      - pay-first-network
  redis:
    image: redis:8.2.3
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - pay-first-network
  db:
    image: postgres:16
    env_file:
      - ./.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - pay-first-network

  web:
    image: pay-first-web-app
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
      - "5678:5678"
    depends_on:
      - db
    env_file:
      - ./.env
    networks:
      - pay-first-network

  worker:
    build: .
    command: python -m celery -A root worker -l info
    volumes:
      - .:/app
    ports:
      - "5680:5680"
    depends_on:
      - rabbitmq
      - redis
    networks:
      - pay-first-network
  celery-beat:
    build: .
    command: python -m celery -A root beat -l info
    volumes:
      - .:/app
    ports:
      - "5681:5681"
    depends_on:
      - rabbitmq
      - redis
    networks:
      - pay-first-network

volumes:
  postgres_data:
networks:
  pay-first-network:
